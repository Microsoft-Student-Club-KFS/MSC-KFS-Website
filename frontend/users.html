<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users — Microsoft Campus Club KFS</title>
<link rel="icon" href="assets/logo.png" type="image/png">
<link rel="stylesheet" href="css/styles.css">
<style>
  .search-row {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
    align-items: center;
  }
  .search-row input {
    flex: 1;
    padding: 10px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    font-size: 14px;
    font-family: var(--font-body);
  }
  .search-row .btn-primary {
    width: auto;
  }
  .status-active { background: #d4edda; color: #155724; }
  .status-suspended { background: #fff3cd; color: #856404; }
  .status-disabled { background: #f8d7da; color: #721c24; }
  
  .user-badge {
    display: inline-block;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 4px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar__mark">
      <div class="logo-badge small">
        <img src="assets/logo.png" alt="Microsoft Student Ambassadors Campus Club logo">
      </div>
      Microsoft Campus Club <span>KFS</span>
    </div>

    <div class="sidebar__user">
      <div class="avatar" id="sidebar-avatar">—</div>
      <div>
        <div class="sidebar__user-name" id="sidebar-name">—</div>
        <div class="sidebar__user-email" id="sidebar-email">—</div>
      </div>
    </div>

    <nav class="sidebar__nav">
      <a class="sidebar__nav-item" href="dashboard.html">Overview</a>
      <a class="sidebar__nav-item" href="organization.html">Organization</a>
      <a class="sidebar__nav-item" href="applications.html" id="nav-apps">Applications</a>
      <a class="sidebar__nav-item active" href="users.html" id="nav-users">Users</a>
      <a class="sidebar__nav-item" href="settings.html" id="nav-settings">Email Settings</a>
    </nav>

    <div style="margin-top:auto; display:flex; align-items:center; justify-content:space-between; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px; width:100%;">
      <button class="btn-logout" id="logout-btn" style="margin:0; border:none; background:none; color:inherit; cursor:pointer;">Sign out</button>
      <button id="theme-toggle" style="background:none; border:none; font-size:18px; cursor:pointer; color:inherit; padding:6px;" title="Toggle Dark/Light Mode">🌙</button>
    </div>
  </aside>

  <main class="main">
    <div class="main__header">
      <h1>User Management</h1>
      <p>Search, update, or remove users from the club database.</p>
    </div>

    <div class="card">
      <div class="search-row">
        <input type="text" id="search-input" placeholder="Search by name, email, or username...">
        <button class="btn-primary" id="btn-create-user">+ New user</button>
      </div>

      <table class="roles-table">
        <thead>
          <tr>
            <th>Name & Username</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Type</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="6" class="loading-state">Loading users...</td></tr>
        </tbody>
      </table>
      <div class="empty-state" id="users-empty" style="display:none;">No users found.</div>
    </div>
  </main>

</div>

<div id="modal-root"></div>

<script src="js/api.js"></script>
<script src="js/org-data.js"></script>
<script src="js/org-modals.js"></script>
<script src="js/users.js"></script>
</body>
</html>
